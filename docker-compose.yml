version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MAINLAYER_API_KEY=${MAINLAYER_API_KEY}
      - ARTICLE_RESOURCE_ID_1=${ARTICLE_RESOURCE_ID_1:-}
      - ARTICLE_RESOURCE_ID_2=${ARTICLE_RESOURCE_ID_2:-}
      - ARTICLE_RESOURCE_ID_3=${ARTICLE_RESOURCE_ID_3:-}
      - ARTICLE_RESOURCE_ID_4=${ARTICLE_RESOURCE_ID_4:-}
      - ARTICLE_RESOURCE_ID_5=${ARTICLE_RESOURCE_ID_5:-}
      - ARTICLE_RESOURCE_ID_6=${ARTICLE_RESOURCE_ID_6:-}
      - ARTICLE_RESOURCE_ID_7=${ARTICLE_RESOURCE_ID_7:-}
      - ARTICLE_RESOURCE_ID_8=${ARTICLE_RESOURCE_ID_8:-}
      - ARTICLE_RESOURCE_ID_9=${ARTICLE_RESOURCE_ID_9:-}
      - ARTICLE_RESOURCE_ID_10=${ARTICLE_RESOURCE_ID_10:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/articles"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
